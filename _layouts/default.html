<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/dark-theme.css' | relative_url }}">
    <style>
        /* Light mode styling overrides */
        html, body {
            background: linear-gradient(to top left, #faf5ff 0%, #e5d9ff 100%);
        }
        
        body.homepage {
            background: #000;
            position: relative;
            overflow-x: hidden;
        }

        body.homepage::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("{{ '/assets/images/week01-artifact.png' | relative_url }}") center center / cover no-repeat;
            opacity: 0;
            animation: bgFadeIn 1.5s ease forwards;
            z-index: -1;
        }

        @keyframes bgFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem 3rem 1rem;
            display: block;
        }

        .home-nav {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header-section {
            margin-bottom: 2rem;
        }

        .card-section {
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
        }

        .card-section a {
            min-width: auto;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
        }

        .card-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .card-section p {
            margin-bottom: 1rem;
            color: var(--muted);
        }

        .card-section p:last-child {
            margin-bottom: 0;
        }

        @media (max-width: 900px) {
            body {
                gap: 2rem;
            }
        }

        @media (max-width: 600px) {
            body {
                margin: 2rem auto;
                padding: 0 1rem 3rem 1rem;
            }
            
            .card-section {
                padding: 1.5rem 2rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body class="{% if page.url == '/' %}homepage{% endif %}">
    <nav class="home-nav">
        <a href="{{ '/' | relative_url }}" class="home-button">Sam Schwing</a>
    </nav>
    {{ content }}
</body>
</html>
