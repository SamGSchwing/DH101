<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/dark-theme.css' | relative_url }}">
    <style>
        /* Light mode styling overrides */
        html, body {
            background: linear-gradient(to top left, #f3e8ff 0%, #a78bfa 100%);
        }
        
        body {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem 4rem 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .header-section {
            grid-column: 1 / -1;
            margin-bottom: 2rem;
        }

        /* Card sections */
        .card-section {
            padding: 3rem 2.5rem;
            margin: 0;
        }

        .card-section a {
            min-width: auto;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
        }

        .card-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .card-section p {
            margin-bottom: 1.5rem;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            body {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }

        @media (max-width: 600px) {
            body {
                margin: 2rem auto;
                padding: 0 1rem 3rem 1rem;
            }
            
            .card-section {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="home-nav">
        <a href="{{ '/' | relative_url }}" class="home-button">Sam Schwing</a>
    </nav>
    {{ content }}
</body>
</html>
