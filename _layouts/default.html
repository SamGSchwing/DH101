<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/dark-theme.css' | relative_url }}">
    <style>
        /* Light mode styling overrides */
        html, body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }
        
        body {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .header-section {
            margin-bottom: 4rem;
        }

        /* Two-column layout for weeks and pages */
        .card-section {
            padding: 3rem 2.5rem;
            margin: 0;
            flex: 1;
            min-width: 300px;
        }

        .card-section:first-of-type {
            margin-top: 0;
        }

        .card-section:nth-of-type(2),
        .card-section:nth-of-type(3) {
            display: inline-block;
            width: calc(50% - 1rem);
            vertical-align: top;
        }

        .card-section:nth-of-type(2) {
            margin-right: 2rem;
        }

        .card-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .card-section p {
            margin-bottom: 1.5rem;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .card-section:nth-of-type(2),
            .card-section:nth-of-type(3) {
                display: block;
                width: 100%;
                margin-right: 0;
                margin-bottom: 3rem;
            }
        }

        @media (max-width: 600px) {
            body {
                margin: 2rem auto;
                padding: 0 1rem 3rem 1rem;
            }
            
            .card-section {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="home-nav">
        <a href="{{ '/' | relative_url }}" class="home-button">Sam Schwing</a>
    </nav>
    {{ content }}
</body>
</html>
