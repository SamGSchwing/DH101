<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/dark-theme.css' | relative_url }}">
    <style>
        /* Light mode styling overrides */
        html, body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }
        
        body {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .card-section {
            padding: 3rem 2.5rem;
            margin: 4rem 0;
        }

        .card-section:first-of-type {
            margin-top: 5rem;
        }

        .card-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .card-section p {
            margin-bottom: 1.5rem;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            body {
                margin: 2rem auto;
                padding: 0 1rem 3rem 1rem;
            }
            
            .card-section {
                padding: 2rem 1.5rem;
                margin: 3rem 0;
            }
        }
    </style>
</head>
<body>
    <nav class="home-nav">
        <a href="{{ '/' | relative_url }}" class="home-button">Sam Schwing</a>
    </nav>
    {{ content }}
</body>
</html>
